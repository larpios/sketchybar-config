[package]
name = "sketchybarrc"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/larpios/sketchybar-config"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }.tar.gz"
pkg-fmt = "tgz"

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
sysinfo = "0.38.4"
ureq = "2.10.1"
local-ip-address = "0.6.3"
media-remote = "0.3.6"
base64 = "0.22.1"
image = "0.25.5"
