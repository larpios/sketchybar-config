name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: Build and Upload Assets
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package Binaries
        run: |
          # x86_64
          mkdir -p x86_64
          cp target/x86_64-apple-darwin/release/sketchybarrc x86_64/
          tar -czvf sketchybarrc-x86_64-apple-darwin.tar.gz -C x86_64 sketchybarrc
          
          # aarch64
          mkdir -p aarch64
          cp target/aarch64-apple-darwin/release/sketchybarrc aarch64/
          tar -czvf sketchybarrc-aarch64-apple-darwin.tar.gz -C aarch64 sketchybarrc

          # Universal
          lipo -create -output sketchybarrc \
            target/x86_64-apple-darwin/release/sketchybarrc \
            target/aarch64-apple-darwin/release/sketchybarrc
          tar -czvf sketchybarrc-universal-apple-darwin.tar.gz sketchybarrc

      - name: Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sketchybarrc-x86_64-apple-darwin.tar.gz
            sketchybarrc-aarch64-apple-darwin.tar.gz
            sketchybarrc-universal-apple-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
